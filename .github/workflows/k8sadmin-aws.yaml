name: k8sadmin-aws

on:
  workflow_dispatch:
    inputs:
      actions:
        description: "Ação a executar"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - plan-destroy
          - destroy

env:
  TF_INPUT: "false"
  TF_LOG: "ERROR"
  TG_NON_INTERACTIVE: "true"
  AWS_REGION: us-east-1

jobs:
  # -----------------------------------------------------------------------
  # plan / apply / plan-destroy — sem aprovação
  # -----------------------------------------------------------------------
  deploy:
    name: ${{ github.event.inputs.actions }}
    if: github.event.inputs.actions != 'destroy'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: k8sadmin-aws
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Set up Terragrunt
        run: |
          curl -Lo terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v1.0.3/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Generate root.hcl
        run: |
          cat <<'EOF' > root.hcl
          locals {
            aws_region  = "${{ env.AWS_REGION }}"
            project     = "k8sadmin-aws"
            path_parts  = split("/", path_relative_to_include())
            environment = local.path_parts[1]
            tf_version  = "~> 1.10"
            aws_version = "~> 5.0"
          }

          remote_state {
            backend = "s3"

            generate = {
              path      = "backend.tf"
              if_exists = "overwrite_terragrunt"
            }

            config = {
              bucket         = "${{ secrets.TF_STATE_BUCKET }}"
              key            = "${path_relative_to_include()}/terraform.tfstate"
              region         = "${{ env.AWS_REGION }}"
              encrypt      = true
              use_lockfile = true
            }
          }

          generate "provider" {
            path      = "provider.tf"
            if_exists = "overwrite_terragrunt"

            contents = <<EOT
          provider "aws" {
            region = "${local.aws_region}"

            default_tags {
              tags = {
                Project     = "${local.project}"
                ManagedBy   = "terragrunt"
                Environment = "${local.environment}"
              }
            }
          }

          terraform {
            required_version = "${local.tf_version}"

            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "${local.aws_version}"
              }
            }
          }
          EOT
          }

          terraform {
            extra_arguments "non_interactive" {
              commands  = get_terraform_commands_that_need_input()
              arguments = ["-input=false"]
            }
          }
          EOF

      - name: Terragrunt plan
        if: github.event.inputs.actions == 'plan'
        working-directory: environments/dev
        run: terragrunt run --all plan --parallelism 1

      - name: Terragrunt apply
        if: github.event.inputs.actions == 'apply'
        working-directory: environments/dev
        run: terragrunt run --all apply --parallelism 1

      - name: Terragrunt plan-destroy
        if: github.event.inputs.actions == 'plan-destroy'
        working-directory: environments/dev
        run: terragrunt run --all -- plan -destroy

  # -----------------------------------------------------------------------
  # destroy — requer aprovação via GitHub Environment "destroy"
  # Configurar: GitHub → Settings → Environments → destroy → Required reviewers
  # -----------------------------------------------------------------------
  destroy-approval:
    name: Destroy (requires approval)
    if: github.event.inputs.actions == 'destroy'
    runs-on: ubuntu-latest
    environment: destroy
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: k8sadmin-aws
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Set up Terragrunt
        run: |
          curl -Lo terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v1.0.3/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Generate root.hcl
        run: |
          cat <<'EOF' > root.hcl
          locals {
            aws_region  = "${{ env.AWS_REGION }}"
            project     = "k8sadmin-aws"
            path_parts  = split("/", path_relative_to_include())
            environment = local.path_parts[1]
            tf_version  = "~> 1.10"
            aws_version = "~> 5.0"
          }

          remote_state {
            backend = "s3"

            generate = {
              path      = "backend.tf"
              if_exists = "overwrite_terragrunt"
            }

            config = {
              bucket         = "${{ secrets.TF_STATE_BUCKET }}"
              key            = "${path_relative_to_include()}/terraform.tfstate"
              region         = "${{ env.AWS_REGION }}"
              encrypt      = true
              use_lockfile = true
            }
          }

          generate "provider" {
            path      = "provider.tf"
            if_exists = "overwrite_terragrunt"

            contents = <<EOT
          provider "aws" {
            region = "${local.aws_region}"

            default_tags {
              tags = {
                Project     = "${local.project}"
                ManagedBy   = "terragrunt"
                Environment = "${local.environment}"
              }
            }
          }

          terraform {
            required_version = "${local.tf_version}"

            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "${local.aws_version}"
              }
            }
          }
          EOT
          }

          terraform {
            extra_arguments "non_interactive" {
              commands  = get_terraform_commands_that_need_input()
              arguments = ["-input=false"]
            }
          }
          EOF

      - name: Terragrunt destroy
        working-directory: environments/dev
        run: terragrunt run --all destroy --parallelism 1
