name: k8sadmin-aws

on:
  workflow_dispatch:
    inputs:
      actions:
        description: "Ação a executar"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - plan-destroy
          - destroy

env:
  TF_INPUT: "false"
  TF_LOG: "ERROR"
  TG_NON_INTERACTIVE: "true"
  TG_BACKEND_BOOTSTRAP: "true"
  AWS_REGION: us-east-1

jobs:
  deploy:
    name: ${{ github.event.inputs.actions }}
    if: github.event.inputs.actions != 'destroy'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    concurrency:
      group: k8sadmin-aws
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # Terraform
      # -----------------------------
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      # -----------------------------
      # Terragrunt
      # -----------------------------
      - name: Set up Terragrunt
        run: |
          curl -Lo terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v1.0.3/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      # -----------------------------
      # AWS Auth (OIDC)
      # -----------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      # -----------------------------
      # GERA O root.hcl DINAMICAMENTE
      # -----------------------------
      - name: Generate root.hcl
        run: |
          cat <<EOF > root.hcl
          remote_state {
            backend = "s3"

            config = {
              bucket         = "${{ secrets.TF_STATE_BUCKET }}"
              key            = "\${path_relative_to_include()}/terraform.tfstate"
              region         = "${{ env.AWS_REGION }}"
              encrypt        = true
              dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
            }
          }

          generate "provider" {
            path      = "provider.tf"
            if_exists = "overwrite_terragrunt"

            contents = <<EOT
          provider "aws" {
            region = "${{ env.AWS_REGION }}"
          }
          EOT
          }
          EOF

      # -----------------------------
      # DEBUG OPCIONAL
      # -----------------------------
      - name: Debug structure
        run: |
          echo "Estrutura do repo:"
          ls -la
          echo "root.hcl:"
          cat root.hcl

      # -----------------------------
      # PLAN
      # -----------------------------
      - name: Terragrunt plan
        if: github.event.inputs.actions == 'plan'
        working-directory: environments/dev
        run: terragrunt run --all plan

      # -----------------------------
      # APPLY
      # -----------------------------
      - name: Terragrunt apply
        if: github.event.inputs.actions == 'apply'
        working-directory: environments/dev
        run: terragrunt run --all apply

      # -----------------------------
      # PLAN DESTROY
      # -----------------------------
      - name: Terragrunt plan-destroy
        if: github.event.inputs.actions == 'plan-destroy'
        working-directory: environments/dev
        run: terragrunt run --all -- plan -destroy

  # -----------------------------------------------------------------------
  #  DESTROY COM APROVAÇÃO
  # -----------------------------------------------------------------------
  destroy:
    name: Destroy (requires approval)
    if: github.event.inputs.actions == 'destroy'
    runs-on: ubuntu-latest

    environment: destroy

    permissions:
      id-token: write
      contents: read

    concurrency:
      group: k8sadmin-aws
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Set up Terragrunt
        run: |
          curl -Lo terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v1.0.3/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Generate root.hcl
        run: |
          cat <<EOF > root.hcl
          remote_state {
            backend = "s3"

            config = {
              bucket         = "${{ secrets.TF_STATE_BUCKET }}"
              key            = "\${path_relative_to_include()}/terraform.tfstate"
              region         = "${{ env.AWS_REGION }}"
              encrypt        = true
              dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
            }
          }

          generate "provider" {
            path      = "provider.tf"
            if_exists = "overwrite_terragrunt"

            contents = <<EOT
          provider "aws" {
            region = "${{ env.AWS_REGION }}"
          }
          EOT
          }
          EOF

      - name: Terragrunt destroy
        working-directory: environments/dev
        run: terragrunt run --all destroy

