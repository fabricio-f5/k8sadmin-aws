name: k8sadmin-aws
description: Kubernetes Admin AWS Role
on:
  workflow_dispatch:
    inputs:
      actions:
        description: "create evironment k8sadmin-aws"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
jobs:
  k8s-01:
    name: k8s-01
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: k8sadmin-aws
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Set up Terragrunt
        run: |
          curl -Lo terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.0/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Terragrunt ${{ github.event.inputs.actions }}
        working-directory: environments/dev
        run: terragrunt run-all ${{ github.event.inputs.actions }} --terragrunt-non-interactive
        env:
          TF_INPUT: "false"
