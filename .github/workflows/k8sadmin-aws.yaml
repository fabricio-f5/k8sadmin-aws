name: k8sadmin-aws

on:
  workflow_dispatch:
    inputs:
      actions:
        description: "Ação a executar"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - plan-destroy
          - destroy

jobs:
  # -----------------------------------------------------------------------
  # plan / apply / plan-destroy — execução direta, sem aprovação
  # -----------------------------------------------------------------------
  deploy:
    name: ${{ github.event.inputs.actions }}
    if: github.event.inputs.actions != 'destroy'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: k8sadmin-aws
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Set up Terragrunt
        run: |
          curl -Lo terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.0/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Terragrunt plan
        if: github.event.inputs.actions == 'plan'
        working-directory: environments/dev
        run: terragrunt run-all plan --terragrunt-non-interactive
        env:
          TF_INPUT: "false"

      - name: Terragrunt apply
        if: github.event.inputs.actions == 'apply'
        working-directory: environments/dev
        run: terragrunt run-all apply --terragrunt-non-interactive
        env:
          TF_INPUT: "false"

      - name: Terragrunt plan-destroy
        if: github.event.inputs.actions == 'plan-destroy'
        working-directory: environments/dev
        run: terragrunt run-all plan -destroy --terragrunt-non-interactive
        env:
          TF_INPUT: "false"

  # -----------------------------------------------------------------------
  # destroy — requer aprovação manual via GitHub Environment "destroy"
  #
  # Para ativar a proteção:
  #   GitHub → Settings → Environments → destroy → Required reviewers
  #   Adicione os usuários que podem aprovar o destroy
  # -----------------------------------------------------------------------
  destroy-approval:
    name: Aguardando aprovação para destroy
    if: github.event.inputs.actions == 'destroy'
    runs-on: ubuntu-latest
    environment: destroy
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: k8sadmin-aws
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Set up Terragrunt
        run: |
          curl -Lo terragrunt https://github.com/gruntwork-io/terragrunt/releases/download/v0.67.0/terragrunt_linux_amd64
          chmod +x terragrunt
          sudo mv terragrunt /usr/local/bin/
          terragrunt --version

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Terragrunt destroy
        working-directory: environments/dev
        run: terragrunt run-all destroy --terragrunt-non-interactive
        env:
          TF_INPUT: "false"
