plugin: amazon.aws.aws_ec2

# Região onde as instâncias estão
regions:
  - us-east-1  # altere para sua região

# Usa instance-id como hostname (necessário para SSM)
hostnames:
  - instance-id

# Grupos dinâmicos baseados na tag Name das instâncias
groups:
  master: "'master' in tags.Name"
  worker: "'worker' in tags.Name"

keyed_groups:
  - key: tags.Role
    prefix: ""
    separator: ""

compose:
  # Conexão via SSM Session Manager (sem SSH)
  ansible_connection: "'community.aws.aws_ssm'"
  ansible_aws_ssm_region: "'us-east-1'"  # altere para sua região

  # Bucket S3 usado pelo SSM para transferência de arquivos
  # Use o mesmo bucket configurado em root.hcl
  ansible_aws_ssm_bucket_name: "'<NOME_DO_BUCKET>'"

  # Caminho do session-manager-plugin instalado localmente
  ansible_aws_ssm_plugin: "'/usr/local/bin/session-manager-plugin'"

  ansible_python_interpreter: "'/usr/bin/python3'"
  ansible_shell_type: "'sh'"
  ansible_shell_executable: "'/bin/sh'"
